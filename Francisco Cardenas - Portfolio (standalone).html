  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

w:rgba(58,20,34,.16);\n}\n/* DUSK · dark */\n[data-palette=\"dusk\"][data-theme=\"dark\"]{\n  --bg:#1E0E16; --bg-2:#28121C; --panel:#2F1622;\n  --ink:#E9D4C6; --line:#C19FAE; --line-soft:#c19fae40; --hair:#c19fae14;\n  --accent:#CC9F79; --accent-2:#A07C8E; --muted:#9a8189;\n  --pin:#CE8E68; --shadow:rgba(0,0,0,.5);\n}\n\n*{box-sizing:border-box;margin:0;padding:0}\nhtml,body{height:100%}\nbody{\n  font-family:var(--r-body);\n  background:var(--bg);\n  color:var(--ink);\n  overflow:hidden;\n  -webkit-font-smoothing:antialiased;\n  transition:background .6s var(--ease), color .6s var(--ease);\n}\nbody.resume-open{overflow:auto}\n::selection{background:var(--accent);color:var(--bg)}\na{color:inherit}\n\n/* paper grain */\n.grain{\n  position:fixed; inset:0; pointer-events:none; z-index:60; opacity:.5; mix-blend-mode:overlay;\n  background-image:url(\"data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='120' height='120'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='.9' numOctaves='2'/><\u002Ffilter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='.5'/><\u002Fsvg>\");\n}\n\n/* ============ Top bar ============ */\n.topbar{\n  position:fixed; top:0; left:0; right:0; z-index:50;\n  display:flex; align-items:center; justify-content:space-between;\n  padding:18px 26px;\n  pointer-events:none;\n}\n.topbar > *{pointer-events:auto}\n.brand{display:flex; align-items:center; gap:12px; text-decoration:none}\n.brand .mark{\n  width:42px; height:42px; display:grid; place-items:center;\n  border:1.5px solid var(--line); border-radius:2px;\n  font-family:var(--r-display); font-weight:700; font-size:18px; letter-spacing:.02em;\n  color:var(--ink); background:var(--bg-2);\n}\n.brand .who{line-height:1.1}\n.brand .who b{font-family:var(--r-display); font-weight:600; font-size:15px; letter-spacing:.01em; display:block}\n.brand .who span{font-family:var(--r-mono); font-size:10.5px; letter-spacing:.06em; color:var(--muted); text-transform:uppercase}\n\n.controls{display:flex; align-items:center; gap:8px}\n.seg{\n  display:flex; border:1.5px solid var(--line-soft); border-radius:3px; overflow:hidden;\n  background:var(--bg-2);\n}\n.seg button{\n  font-family:var(--r-mono); font-size:10.5px; letter-spacing:.06em; text-transform:uppercase;\n  padding:9px 11px; border:0; background:transparent; color:var(--muted); cursor:pointer;\n  transition:background .25s, color .25s; white-space:nowrap;\n}\n.seg button + button{border-left:1.5px solid var(--line-soft)}\n.seg button[aria-pressed=\"true\"]{background:var(--line); color:var(--bg)}\n.seg button:hover{color:var(--ink)}\n.seg button[aria-pressed=\"true\"]:hover{color:var(--bg)}\n\n.btn-resume{\n  font-family:var(--r-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;\n  padding:9px 14px; border:1.5px solid var(--line); border-radius:3px;\n  background:var(--accent); color:var(--bg); cursor:pointer; font-weight:700;\n  transition:transform .2s var(--ease), filter .2s;\n}\n.btn-resume:hover{transform:translateY(-1px); filter:brightness(1.05)}\n\n/* ============ Stage / scene ============ */\n.stage{\n  position:fixed; inset:0; overflow:hidden;\n  cursor:grab; touch-action:pan-y;\n}\n.stage.dragging{cursor:grabbing}\n.scene{\n  position:absolute; top:0; left:0; height:100%;\n  transform:translate3d(calc(var(--pan)),0,0);\n  will-change:transform;\n}\n.layer{position:absolute; top:0; left:0; height:100%}\n\n/* grid layer (slowest) */\n.layer--grid{\n  width:100%;\n  background-image:\n    linear-gradient(var(--hair) 1px, transparent 1px),\n    linear-gradient(90deg, var(--hair) 1px, transparent 1px);\n  background-size:34px 34px;\n  transform:translate3d(calc(var(--pan) * -0.78 * -1 + 0px),0,0);\n}\n/* major grid overlay */\n.layer--gridmajor{\n  width:100%;\n  background-image:\n    linear-gradient(var(--line-soft) 1px, transparent 1px),\n    linear-gradient(90deg, var(--line-soft) 1px, transparent 1px);\n  background-size:170px 170px;\n  opacity:.5;\n  transform:translate3d(calc(var(--pan) * 0.22),0,0);\n}\n\n/* elevation line drawing (mid speed) */\n.layer--elevation{transform:translate3d(calc(var(--pan) * 0.12 + var(--mx) * 14px),0,0)}\n.elevation{position:absolute; bottom:9%; left:0; height:62%; }\n.elevation svg{height:100%; width:auto; display:block; overflow:visible}\n.elevation svg line,\n.elevation svg rect,\n.elevation svg path{fill:none; stroke:var(--line-soft); stroke-width:1.4; vector-effect:non-scaling-stroke}\n.elevation svg .em{stroke:var(--line); stroke-width:1.6}\n.elevation svg .fillsoft{fill:var(--hair); stroke:none}\n.elevation svg text{fill:var(--muted); stroke:none; font-family:var(--r-mono); font-size:13px; letter-spacing:.05em}\n\n/* details layer (foreground/full speed) */\n.layer--details{transform:translate3d(calc(var(--mx) * -22px),0,0)}\n\n/* ---- a detail \"callout\" on the sheet ---- */\n.detail{\n  position:absolute; bottom:0; transform:translateY(var(--rise,0));\n  width:340px;\n  animation:none;\n}\n.detail .frame{\n  border:1.5px solid var(--line); background:var(--panel);\n  box-shadow:0 24px 50px -28px var(--shadow);\n  position:relative;\n}\n.detail .frame::before{ /* corner ticks */\n  content:\"\"; position:absolute; inset:6px; border:1px solid var(--line-soft);\n  pointer-events:none;\n}\n.detail .head{\n  display:flex; align-items:flex-start; justify-content:space-between; gap:10px;\n  padding:16px 16px 10px;\n}\n.detail .num{\n  font-family:var(--r-display); font-weight:700; font-size:54px; line-height:.8;\n  color:var(--accent); letter-spacing:-.02em;\n}\n.detail .kick{\n  font-family:var(--r-mono); font-size:10px; letter-spacing:.14em; text-transform:uppercase;\n  color:var(--muted); text-align:right; padding-top:4px;\n}\n.detail h3{\n  font-family:var(--r-display); font-weight:600; font-size:23px; letter-spacing:-.01em;\n  padding:0 16px 12px; line-height:1.05;\n}\n.detail .meta{\n  border-top:1.5px solid var(--line-soft);\n  display:flex; align-items:center; justify-content:space-between;\n  padding:11px 16px;\n  font-family:var(--r-mono); font-size:10px; letter-spacing:.08em; text-transform:uppercase; color:var(--muted);\n}\n.detail .meta .open{\n  display:inline-flex; align-items:center; gap:7px; color:var(--ink); font-weight:700; cursor:pointer;\n}\n.detail .meta .open .dot{width:7px;height:7px;border-radius:50%;background:var(--accent)}\n.detail:hover .frame{border-color:var(--accent)}\n.detail .preview{padding:0 16px 16px}\n\n/* photo pinned to the sheet */\n.pin-photo{\n  position:relative; border:5px solid var(--panel); box-shadow:0 16px 34px -18px var(--shadow);\n  background:var(--bg-2); overflow:hidden;\n}\n.pin-photo img{display:block; width:100%; height:100%; object-fit:cover; filter:saturate(.92) contrast(1.02)}\n.pin-photo::after{ /* tape */\n  content:\"\"; position:absolute; top:-9px; left:50%; transform:translateX(-50%) rotate(-2deg);\n  width:62px; height:18px; background:var(--accent); opacity:.6;\n}\n\n/* skill tick marks preview */\n.ticks{display:flex; flex-direction:column; gap:9px}\n.tick{display:flex; align-items:center; gap:10px; font-family:var(--r-mono); font-size:11px; color:var(--ink)}\n.tick .bar{flex:1; height:8px; border:1.5px solid var(--line); position:relative; overflow:hidden}\n.tick .bar i{position:absolute; inset:0; background:var(--accent); transform-origin:left; transform:scaleX(var(--v,.8))}\n\n/* hero / title block */\n.hero{position:absolute; bottom:0; width:560px}\n.hero .ey{font-family:var(--r-mono); font-size:11px; letter-spacing:.2em; text-transform:uppercase; color:var(--accent); margin-bottom:14px}\n.hero h1{\n  font-family:var(--r-display); font-weight:700; font-size:clamp(46px,7vw,92px);\n  line-height:.92; letter-spacing:-.03em; margin-bottom:18px;\n}\n.hero h1 .ln{display:block; overflow:visible}\n.hero h1 .ln span{display:block}\n.hero .sub{font-size:16px; max-width:30ch; color:var(--muted); line-height:1.5; margin-bottom:22px}\n.hero .sub b{color:var(--ink); font-weight:600}\n.hero .scale-tag{\n  font-family:var(--r-mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted);\n  border-top:1.5px solid var(--line-soft); padding-top:12px; display:flex; gap:26px; flex-wrap:wrap;\n}\n\n/* title block (fixed, bottom-right) */\n.titleblock{\n  position:fixed; right:18px; bottom:54px; z-index:40;\n  border:1.5px solid var(--line); background:var(--bg-2);\n  font-family:var(--r-mono); font-size:10px; letter-spacing:.05em; color:var(--muted);\n  display:grid; grid-template-columns:auto auto; min-width:230px;\n  box-shadow:0 18px 40px -26px var(--shadow);\n}\n.titleblock div{padding:7px 11px; border-top:1px solid var(--line-soft)}\n.titleblock div:nth-child(-n+2){border-top:0}\n.titleblock .k{color:var(--muted)}\n.titleblock .v{color:var(--ink); text-align:right; border-left:1px solid var(--line-soft)}\n.titleblock .big{grid-column:1/-1; font-family:var(--r-display); font-size:13px; font-weight:700; color:var(--ink); letter-spacing:.02em; text-transform:uppercase}\n\n/* ============ Station nav ============ */\n.stations{\n  position:fixed; left:0; right:0; bottom:0; z-index:45;\n  display:flex; align-items:center; gap:0;\n  padding:0 18px; height:46px;\n  background:linear-gradient(to top, var(--bg) 40%, transparent);\n  pointer-events:none;\n}\n.stations .track{\n  pointer-events:auto;\n  display:flex; align-items:center; gap:2px; flex-wrap:nowrap; overflow-x:auto; scrollbar-width:none;\n}\n.stations .track::-webkit-scrollbar{display:none}\n.stn{\n  font-family:var(--r-mono); font-size:10px; letter-spacing:.06em; text-transform:uppercase;\n  color:var(--muted); background:transparent; border:0; cursor:pointer;\n  padding:7px 12px; display:flex; align-items:center; gap:8px; white-space:nowrap;\n  transition:color .25s;\n}\n.stn .n{color:var(--accent); font-weight:700}\n.stn::after{content:\"\"; width:5px; height:5px; border:1.5px solid var(--line-soft); transform:rotate(45deg); transition:.25s}\n.stn:last-child::after{display:none}\n.stn:hover{color:var(--ink)}\n.stn.active{color:var(--ink)}\n.stn.active .n{text-decoration:underline; text-underline-offset:3px}\n\n/* drag hint */\n.hint{\n  position:fixed; left:50%; bottom:58px; transform:translateX(-50%); z-index:44;\n  font-family:var(--r-mono); font-size:10.5px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted);\n  display:flex; align-items:center; gap:12px; opacity:0; transition:opacity .6s;\n}\nbody.lit .hint{opacity:1}\n.hint.gone{opacity:0 !important; pointer-events:none}\n.hint .arrows{display:flex; gap:5px}\n.hint .arrows i{width:8px;height:8px;border-right:1.5px solid var(--accent); border-bottom:1.5px solid var(--accent); transform:rotate(-45deg); animation:nudge 1.4s var(--ease) infinite}\n.hint .arrows i:nth-child(2){animation-delay:.15s; opacity:.6}\n.hint .arrows i:nth-child(3){animation-delay:.3s; opacity:.3}\n@keyframes nudge{0%,100%{transform:rotate(-45deg) translate(0,0)}50%{transform:rotate(-45deg) translate(3px,3px)}}\n\n/* ============ Detail panel (slide-in) ============ */\n.scrim{\n  position:fixed; inset:0; z-index:70; background:color-mix(in srgb, var(--bg) 70%, transparent);\n  backdrop-filter:blur(3px); opacity:0; pointer-events:none; transition:opacity .4s var(--ease);\n}\n.scrim.show{opacity:1; pointer-events:auto}\n.panel{\n  position:fixed; top:0; right:0; bottom:0; z-index:71; width:min(560px,94vw);\n  background:var(--panel); border-left:1.5px solid var(--line);\n  transform:translateX(105%); transition:transform .55s var(--ease);\n  display:flex; flex-direction:column;\n  box-shadow:-30px 0 70px -40px var(--shadow);\n}\n.panel.show{transform:translateX(0)}\n.panel .p-top{\n  display:flex; align-items:flex-start; justify-content:space-between;\n  padding:26px 30px 0;\n}\n.panel .p-num{font-family:var(--r-display); font-weight:700; font-size:13px; letter-spacing:.1em; color:var(--accent)}\n.panel .p-close{\n  width:38px; height:38px; border:1.5px solid var( ent); font-size:14px; margin-top:2px; font-weight:600}\n.role .rn{font-size:14px; color:var(--muted); margin-top:7px; line-height:1.55}\n.p-photos{display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin:8px 0 24px}\n.p-photos figure{border:5px solid var(--bg-2); box-shadow:0 16px 34px -20px var(--shadow); overflow:hidden}\n.p-photos img{display:block; width:100%; aspect-ratio:4/5; object-fit:cover}\n.p-photos figcaption{font-family:var(--r-mono); font-size:10px; color:var(--muted); padding:7px 4px 0; letter-spacing:.04em}\n.linklist{display:flex; flex-direction:column; gap:0; margin-top:4px}\n.linkrow{\n  display:flex; align-items:center; justify-content:space-between; gap:14px;\n  padding:18px 0; border-top:1.5px solid var(--line-soft); text-decoration:none;\n  transition:padding .25s var(--ease);\n}\n.linkrow:hover{padding-left:8px}\n.linkrow .lk{font-family:var(--r-mono); font-size:10.5px; letter-spacing:.1em; text-transform:uppercase; color:var(--muted)}\n.linkrow .lv{font-family:var(--r-display); font-weight:600; font-size:21px}\n.linkrow .ar{font-size:20px; color:var(--accent); transition:transform .25s var(--ease)}\n.linkrow:hover .ar{transform:translate(4px,-4px)}\n\n/* ============ Resume / fast-lane view ============ */\n.resume{\n  position:fixed; inset:0; z-index:80; background:var(--bg); color:var(--ink);\n  overflow-y:auto; opacity:0; pointer-events:none; transition:opacity .45s var(--ease);\n}\n.resume.show{opacity:1; pointer-events:auto}\n.resume .sheet{max-width:820px; margin:0 auto; padding:84px 40px 120px}\n.resume .r-back{\n  position:fixed; top:18px; left:26px; z-index:81;\n  font-family:var(--r-mono); font-size:10.5px; letter-spacing:.08em; text-transform:uppercase;\n  border:1.5px solid var(--line); background:var(--bg-2); color:var(--ink);\n  padding:9px 14px; cursor:pointer; border-radius:3px;\n}\n.resume .r-head{border-bottom:2px solid var(--line); padding-bottom:26px; margin-bottom:34px}\n.resume .r-head h1
